name: Release
run-name: Release ${{ github.ref_name }}   # else the run is titled by the tagged commit's message
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@50c6357e33a5c715e4f55df9e366c9600cca0943 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleAccountBalancer
      dist_subfolder: "Simple Account Balancer"
      python_version: "3.14"
      build_command: "Build_Simple_Account_Balancer.bat"
      app_id: "ecf669e1-0749-43af-86c3-f74c48bc21f3"
      entry_script: "simple_account_balancer.py"
